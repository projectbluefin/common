# Dispatch snippet for execute-release.yml in image repos
#
# Add this job AFTER the existing `execute` and `release-notes` jobs
# in bluefin/.github/workflows/execute-release.yml (and bluefin-lts equivalent).
#
# This dispatches an ISO rebuild to projectbluefin/iso whenever a
# testing→stable promotion completes successfully.
#
# Prerequisites:
#   - The iso-auto-rebuild.yml workflow must exist in projectbluefin/iso
#   - GITHUB_TOKEN needs `repo` scope for cross-repo dispatch
#     (or use a GitHub App token with dispatch permission on projectbluefin/iso)

# --- Add to execute-release.yml after release-notes job ---

  dispatch-iso-rebuild:
    name: Trigger ISO rebuild
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Generate dispatch token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ISO_DISPATCH_APP_ID }}
          private-key: ${{ secrets.ISO_DISPATCH_PRIVATE_KEY }}
          repositories: iso

      - name: Dispatch ISO rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Determine variant from repo context
          # bluefin → stable, bluefin-lts → lts
          REPO_NAME="${{ github.repository }}"
          case "$REPO_NAME" in
            */bluefin)
              VARIANT="stable"
              IMAGE_TAG="stable"
              EVENT_TYPE="stable-promoted"
              ;;
            */bluefin-lts)
              VARIANT="lts"
              IMAGE_TAG="lts"
              EVENT_TYPE="lts-promoted"
              ;;
            *)
              echo "Unknown repo ${REPO_NAME} — skipping ISO dispatch"
              exit 0
              ;;
          esac

          # Get the promoted digest from the execute job
          # (this would come from the reusable-execute-release outputs)
          DIGEST="${{ needs.execute.outputs.promoted_digest || 'unknown' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh api repos/projectbluefin/iso/dispatches \
            -f event_type="${EVENT_TYPE}" \
            -f 'client_payload[variant]'="${VARIANT}" \
            -f 'client_payload[image_tag]'="${IMAGE_TAG}" \
            -f 'client_payload[source_repo]'="${{ github.repository }}" \
            -f 'client_payload[digest]'="${DIGEST}" \
            -f 'client_payload[run_url]'="${RUN_URL}"

          echo "Dispatched ${EVENT_TYPE} to projectbluefin/iso (variant=${VARIANT})"

# --- Notes ---
#
# Token: Uses a GitHub App installation token (ISO_DISPATCH_APP_ID +
# ISO_DISPATCH_PRIVATE_KEY org secrets). The app needs `contents:write`
# permission on projectbluefin/iso. Reuse MERGERAPTOR app if it has
# dispatch permission on iso, or create a dedicated dispatch app.
