# Upgraded build.yml for projectbluefin/common
#
# Changes from current build.yml:
# 1. Keyless cosign signing (OIDC via Fulcio — no SIGNING_SECRET needed)
# 2. SBOM generation via syft (attached as OCI referrer)
# 3. SLSA L2 provenance attestation via actions/attest-build-provenance
# 4. Trivy CVE scan (fail on CRITICAL)
# 5. Retry on registry push
#
# This addresses: #513 (keyless signing), actions#86 (SBOM + scan)
#
# Deploy to: projectbluefin/common/.github/workflows/build.yml
# Prerequisites:
#   - Repository Settings > Actions > General > "Allow GitHub Actions to create
#     and approve pull requests" — already enabled
#   - id-token: write permission — enables OIDC for keyless signing

name: Build
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  merge_group:
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: common

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write       # Required for keyless signing + OIDC attestation
      attestations: write   # Required for GitHub attestation API

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          alias_tags=()
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            alias_tags+=("pr-${{ github.event.number }}")
          else
            echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
            alias_tags+=("latest")
          fi
          echo "alias_tags=${alias_tags[*]}" >> "$GITHUB_OUTPUT"

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: |
            ${{ steps.generate-tags.outputs.alias_tags }}
            ${{ steps.generate-tags.outputs.date }}
            ${{ steps.generate-tags.outputs.sha_short }}
          oci: true

      # --- CVE Scan (new) ---
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: 'localhost/${{ env.IMAGE_NAME }}:${{ steps.generate-tags.outputs.alias_tags }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        id: push
        if: github.event_name != 'pull_request'
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          extra-args: |
            --compression-format=zstd:chunked

      # --- Keyless Signing (replaces key-based) ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request'

      - name: Sign container image (keyless)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign -y "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
        # No COSIGN_PRIVATE_KEY needed — uses GitHub OIDC token automatically
        # Signature recorded in Rekor transparency log
        # Verify with: cosign verify --certificate-identity-regexp "https://github.com/projectbluefin/common/" \
        #   --certificate-oidc-issuer https://token.actions.githubusercontent.com \
        #   ghcr.io/projectbluefin/common:latest

      # --- SBOM Generation (new) ---
      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@d55e419ceca5e5e6b98adf6aaae6b49a7589f0b4 # v0.18.3
        with:
          image: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attach SBOM to image
        if: github.event_name != 'pull_request'
        run: |
          cosign attach sbom \
            --sbom sbom.cdx.json \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

      # --- SLSA Provenance Attestation (new) ---
      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
