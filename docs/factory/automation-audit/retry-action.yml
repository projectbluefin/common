# Retry with exponential backoff — composite action
#
# Deploy to: projectbluefin/actions/actions/retry/action.yml
#
# Usage in any workflow:
#   - name: Push with retry
#     uses: projectbluefin/actions/actions/retry@<sha>
#     with:
#       command: buildah push "$IMAGE" "docker://$REGISTRY/$IMAGE:$TAG"
#       max_attempts: 3
#       initial_wait_seconds: 10
#       retry_on: "rate limit|timeout|429|503|connection reset"

name: Retry with Backoff
description: |
  Retries a shell command with exponential backoff. Optionally filters
  retries to only trigger on specific error patterns (rate limits, timeouts).

inputs:
  command:
    description: 'Shell command to execute'
    required: true
  max_attempts:
    description: 'Maximum number of attempts (1 = no retry)'
    required: false
    default: '3'
  initial_wait_seconds:
    description: 'Initial wait between retries (doubles each attempt)'
    required: false
    default: '10'
  retry_on:
    description: 'Regex pattern — only retry if stderr matches this (empty = always retry)'
    required: false
    default: ''
  working_directory:
    description: 'Working directory for command execution'
    required: false
    default: '.'

outputs:
  attempts:
    description: 'Number of attempts made'
    value: ${{ steps.retry.outputs.attempts }}
  success:
    description: 'Whether the command eventually succeeded (true/false)'
    value: ${{ steps.retry.outputs.success }}

runs:
  using: composite
  steps:
    - name: Execute with retry
      id: retry
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set +e  # Don't exit on failure — we handle it

        MAX_ATTEMPTS=${{ inputs.max_attempts }}
        WAIT=${{ inputs.initial_wait_seconds }}
        RETRY_PATTERN="${{ inputs.retry_on }}"
        ATTEMPT=1

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "::group::Attempt $ATTEMPT/$MAX_ATTEMPTS"

          # Run the command, capture stderr
          STDERR_FILE=$(mktemp)
          eval "${{ inputs.command }}" 2> >(tee "$STDERR_FILE" >&2)
          RC=$?

          echo "::endgroup::"

          if [ $RC -eq 0 ]; then
            echo "Command succeeded on attempt $ATTEMPT"
            echo "attempts=$ATTEMPT" >> "$GITHUB_OUTPUT"
            echo "success=true" >> "$GITHUB_OUTPUT"
            rm -f "$STDERR_FILE"
            exit 0
          fi

          # Check if we should retry based on error pattern
          if [ -n "$RETRY_PATTERN" ]; then
            if ! grep -qiE "$RETRY_PATTERN" "$STDERR_FILE" 2>/dev/null; then
              echo "::error::Command failed with non-retryable error (pattern '$RETRY_PATTERN' not found in stderr)"
              echo "attempts=$ATTEMPT" >> "$GITHUB_OUTPUT"
              echo "success=false" >> "$GITHUB_OUTPUT"
              rm -f "$STDERR_FILE"
              exit $RC
            fi
          fi

          rm -f "$STDERR_FILE"

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "::error::All $MAX_ATTEMPTS attempts failed"
            echo "attempts=$ATTEMPT" >> "$GITHUB_OUTPUT"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit $RC
          fi

          echo "::warning::Attempt $ATTEMPT failed (exit $RC). Waiting ${WAIT}s before retry..."
          sleep "$WAIT"
          WAIT=$((WAIT * 2))
          ATTEMPT=$((ATTEMPT + 1))
        done
