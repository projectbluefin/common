name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - labels.json
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo list (e.g. bluefin,dakota). Leave empty for all.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Require mergeraptor secrets
        run: |
          if [[ -z "${{ secrets.MERGERAPTOR_APP_ID }}" || -z "${{ secrets.MERGERAPTOR_PRIVATE_KEY }}" ]]; then
            echo "::error::MERGERAPTOR_APP_ID and MERGERAPTOR_PRIVATE_KEY must be set as org/repo secrets."
            echo "::error::These are required for cross-repo label sync. Configure the mergeraptor GitHub App."
            exit 1
          fi

      - name: Get mergeraptor token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.MERGERAPTOR_APP_ID }}
          private-key: ${{ secrets.MERGERAPTOR_PRIVATE_KEY }}
          owner: projectbluefin

      - name: Checkout common
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Sync labels to core factory repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REPOS: ${{ github.event.inputs.repos }}
        run: |
          set -euo pipefail

          REPOS="projectbluefin/common projectbluefin/bluefin projectbluefin/bluefin-lts projectbluefin/dakota projectbluefin/actions projectbluefin/testsuite"

          if [[ -n "${INPUT_REPOS}" ]]; then
            REPOS=$(echo "${INPUT_REPOS}" | tr ',' '\n' | sed 's|^|projectbluefin/|' | tr '\n' ' ')
          fi

          mapfile -t DESIRED_LABELS < <(jq -r '.[].name' labels.json)
          RETIRED_LABELS=(
            "bug"
            "type/bug"
            "type/feature"
            "agent/claimed"
            "copilot-ready"
            "hold"
            "needs-human/agent-ready"
            "size:XS"
            "size:S"
            "size:M"
            "size:L"
            "size:XL"
            "status/approved"
          )

          for repo in ${REPOS}; do
            created=0
            updated=0
            deleted=0

            echo "--- Syncing ${repo} ---"

            while IFS=$'\t' read -r name color desc; do
              if gh label create "${name}" --color "${color}" --description "${desc}" --repo "${repo}" >/dev/null 2>/dev/null; then
                ((created+=1))
              else
                gh label edit "${name}" --color "${color}" --description "${desc}" --repo "${repo}" >/dev/null
                ((updated+=1))
              fi
            done < <(jq -r '.[] | [.name, .color, .description] | @tsv' labels.json)

            for retired in "${RETIRED_LABELS[@]}"; do
              if printf '%s\n' "${DESIRED_LABELS[@]}" | grep -Fxq "${retired}"; then
                continue
              fi

              if gh label delete "${retired}" --yes --repo "${repo}" >/dev/null 2>&1; then
                ((deleted+=1))
              else
                true
              fi
            done

            echo "${repo}: created=${created} updated=${updated} deleted=${deleted}"
          done
