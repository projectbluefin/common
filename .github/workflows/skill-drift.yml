name: Skill Drift

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  skill-drift:
    uses: projectbluefin/actions/.github/workflows/skill-drift-check.yml@04f8a600db513b007c54cd5d52e707cf67b80814 # main
    with:
      code-paths: '[".github/workflows/**", "system_files/**", "Containerfile", "Justfile"]'
      skill-paths: '["docs/skills/**", "docs/*.md", "AGENTS.md"]'
