name: Skill Drift

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  skill-drift:
    uses: projectbluefin/actions/.github/workflows/skill-drift-check.yml@d290241b8b7a6721be8855d1d94cdb8209652080 # main
    with:
      code-paths: '[".github/workflows/**", "system_files/**", "Containerfile", "Justfile"]'
      skill-paths: '["docs/skills/**", "docs/*.md", "AGENTS.md"]'
