name: Skill Drift

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  skill-drift:
    uses: projectbluefin/actions/.github/workflows/skill-drift-check.yml@6274199cfb6666180ac2fd0ad5a41bc8440e0929 # v1
    with:
      code-paths: '[".github/workflows/**", "Containerfile", "Justfile", "system_files/**"]'
      skill-paths: '["docs/skills/**", "docs/*.md", "AGENTS.md"]'
