# Framework Desktop (AMD Ryzen AI Max 300 Series) — audio priority fixes
#
# Raises HDMI output priority so it is selected as the default sink on
# this device (stock WirePlumber ALSA priority for HDMI is ~1000; setting
# 1100 ensures it wins over other PCI audio devices on this system).
#
# Raises the internal mic priority so it auto-selects over USB/Bluetooth
# alternatives (stock WirePlumber BT loopback source is at ~2010; setting
# 2100 ensures the internal mic wins).
#
# PCI addresses (c3_00.1 for HDMI, c3_00.6 for mic) are sourced from
# Bazzite and assumed stable across Framework Desktop units — these
# addresses reflect the AMD Ryzen AI Max 300 Series internal fabric routing.
# Verify with: pactl list sinks | grep node.name
#
# Closes: https://github.com/projectbluefin/common/issues/671

monitor.alsa.rules = [
  # Raise HDMI output priority and set latency tuning
  {
    matches = [{ node.name = "~alsa_output.pci-0000_c3_00.1.*" }]
    actions = {
      update-props = {
        priority.driver = 1100
        priority.session = 1100
        api.alsa.period-size = 256
        api.alsa.headroom = 1024
        session.suspend-timeout-seconds = 0
      }
    }
  },
  # Raise internal mic priority above USB/Bluetooth alternatives
  {
    matches = [{ node.name = "~alsa_input.pci-0000_c3_00.6.*" }]
    actions = {
      update-props = {
        priority.driver = 2100
        priority.session = 2100
      }
    }
  }
]
